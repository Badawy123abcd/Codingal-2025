<!DOCTYPE html>
<html>
    <body>
        <h2>JavaScript Call Stack</h2>
        <p id="demo"></p>
        <script>
            function first() {
                second();
                document.getElementById("demo").innerHTML = "Hello from first()";
            }

            function second() {
                third();
                document.getElementById("demo").innerHTML = "Hello from second()";
            }

            function third() {
                document.getElementById("demo").innerHTML = "Hello from third()";
            }

            first();
        </script>
    </body>
</html>
