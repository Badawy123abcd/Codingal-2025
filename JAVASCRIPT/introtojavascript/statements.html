<!DOCTYPE html>
<html>
    <body>
        <h2>Javascript Statements</h2>
        <P id="demo" ></P>
        <script>
            var x = 5; // This is a statement
            var y = 10; // This is another statement
            var z = x + y; // This is yet another statement
            document.getElementById("demo").innerHTML = "The value of z is: " + z; // This is a statement that displays the result
        </script>
    </body>
</html>
