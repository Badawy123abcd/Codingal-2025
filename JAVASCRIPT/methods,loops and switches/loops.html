<!DOCTYPE html>
<html>

<body>
    <h2>JavaScript Loops</h2>
    <p id="demo"></p>
<script>
    var fruits = ["Banana", "Orange", "Apple", "Mango", "Pineapple"];

    for (i = 0; i < fruits.length; i++) {
        var text = fruits[i] + "<br>"; 
        document.write(text);
        }
        document.getElementById("demo").innerHTML = text;
</script>
    
</body>
</html>
