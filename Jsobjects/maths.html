<!DOCTYPE html>
<html>
    <head>
        <title>JavaScript Math Object Methods</title>
    </head>
    <body>
        <h2>JavaScript Math Object Methods</h2>
        <script type="text/javascript">
            var value = Math.acos(-1);
            document.write("The arccosine of -1 is: " + value);
            var value = Math.asin(1);
            document.write("<br>The arcsine of 1 is: " + value);
            var value = Math.atan(.5);
            document.write("<br>The arctangent of 0.5 is: " + value);
        </script>

    </body>
</html>
